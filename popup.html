<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POE2 市集汉化设置</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            width: 280px;
            padding: 0;
            background-color: #0f1115;
            color: #dcdcdc;
            border: 1px solid #333;
        }
        
        .header {
            background: linear-gradient(180deg, #1a2f23 0%, #0f1115 100%);
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #2a4030;
        }

        h3 {
            margin: 0;
            color: #e0d0b0;
            font-size: 16px;
            letter-spacing: 1px;
        }

        .version {
            font-size: 11px;
            color: #666;
            margin-top: 5px;
        }

        .content {
            padding: 15px;
        }

        .section-title {
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #333;
        }

        .language-option {
            margin-bottom: 8px;
            padding: 12px;
            border-radius: 4px;
            background-color: #1c1f26;
            cursor: pointer;
            border: 1px solid #333;
            transition: all 0.2s;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .language-option:hover {
            background-color: #2a2d35;
            border-color: #4CAF50;
        }
        
        .language-option.selected {
            background-color: #2e4a33;
            color: #fff;
            border-color: #4CAF50;
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.2);
        }

        .language-option .check-mark {
            color: #4CAF50;
            font-weight: bold;
        }

        .footer {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #333;
            text-align: center;
        }

        .footer-link {
            font-size: 11px;
            color: #666;
            cursor: pointer;
            transition: color 0.2s;
        }

        .footer-link:hover {
            color: #4CAF50;
        }

        .status-msg {
            font-size: 11px;
            color: #4CAF50;
            margin-top: 10px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .status-msg.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="header">
        <h3>POE2 市集&Ninja一条龙汉化</h3>
        <div class="version">v2026.5.22</div>
    </div>
    
    <div class="content">
        <div class="section-title">全局语言设置</div>
        
        <div class="language-option" data-lang="zh_cn">
            <span>简体中文</span>
            <span class="check-mark" style="display: none;">✓</span>
        </div>
        
        <div class="language-option" data-lang="zh_tw">
            <span>繁體中文</span>
            <span class="check-mark" style="display: none;">✓</span>
        </div>
        
        <div class="language-option" data-lang="en">
            <span>English (原文)</span>
            <span class="check-mark" style="display: none;">✓</span>
        </div>

        <div class="status-msg" id="status-msg">语言已切换，正在刷新页面...</div>

        <div class="footer">
            <span class="footer-link" id="open-settings">⚙️ 打开详细设置</span>
        </div>
    </div>

    <script src="js/config/language_config.js"></script>
    <script src="popup.js"></script>
</body>
</html>
